<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>K.M.I – איפוס סיסמה</title>

    <style>
        :root {
          --bg-1: #0f172a;
          --bg-2: #1d4ed8;
          --bg-3: #0ea5e9;

          --card: rgba(255, 255, 255, 0.14);
          --card-border: rgba(255, 255, 255, 0.28);

          --text: #ffffff;
          --muted: rgba(255, 255, 255, 0.78);

          --input-bg: rgba(255, 255, 255, 0.96);
          --input-text: #0f172a;

          --error-text: #fecaca;
          --error-bg: rgba(127, 29, 29, 0.34);
          --error-border: rgba(254, 202, 202, 0.35);

          --success-text: #bbf7d0;
          --success-bg: rgba(20, 83, 45, 0.30);
          --success-border: rgba(187, 247, 208, 0.40);

          --button: #ffffff;
          --button-text: #0f172a;

          --shadow: rgba(15, 23, 42, 0.38);
        }

        * {
          box-sizing: border-box;
        }

        html {
          min-height: 100%;
        }

        body {
          margin: 0;
          min-height: 100vh;
          font-family: Arial, Helvetica, sans-serif;
          color: var(--text);
          background:
            radial-gradient(circle at top left, rgba(255, 255, 255, 0.22), transparent 32%),
            radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.28), transparent 34%),
            linear-gradient(160deg, var(--bg-1), var(--bg-2), var(--bg-3));
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
        }

        .page {
          width: 100%;
          max-width: 460px;
        }

        .brand {
          text-align: center;
          margin-bottom: 18px;
        }

        .brand-badge {
          width: 78px;
          height: 78px;
          margin: 0 auto 14px;
          border-radius: 24px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 255, 255, 0.16);
          border: 1px solid rgba(255, 255, 255, 0.30);
          box-shadow: 0 20px 45px var(--shadow);
          font-size: 24px;
          font-weight: 900;
          letter-spacing: 1px;
        }

        .brand h1 {
          margin: 0;
          font-size: 28px;
          line-height: 1.2;
          font-weight: 900;
        }

        .brand p {
          margin: 8px 0 0;
          color: var(--muted);
          font-size: 15px;
          line-height: 1.45;
        }

        .card {
          padding: 26px;
          border-radius: 28px;
          background: var(--card);
          border: 1px solid var(--card-border);
          box-shadow: 0 28px 70px var(--shadow);
          backdrop-filter: blur(18px);
          -webkit-backdrop-filter: blur(18px);
        }

        .card h2 {
          margin: 0 0 8px;
          font-size: 23px;
          line-height: 1.25;
          font-weight: 900;
          text-align: center;
        }

        .subtitle {
          margin: 0 0 22px;
          color: var(--muted);
          font-size: 15px;
          line-height: 1.55;
          text-align: center;
        }

        label {
          display: block;
          margin: 14px 0 7px;
          font-weight: 700;
          font-size: 14px;
        }

        input {
          width: 100%;
          min-height: 52px;
          padding: 0 14px;
          border-radius: 16px;
          border: none;
          outline: none;
          background: var(--input-bg);
          color: var(--input-text);
          font-size: 16px;
        }

        input:focus {
          box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.36);
        }

        input:disabled {
          opacity: 0.72;
          cursor: not-allowed;
        }

        button {
          width: 100%;
          min-height: 54px;
          margin-top: 20px;
          border: none;
          border-radius: 18px;
          background: var(--button);
          color: var(--button-text);
          font-size: 16px;
          font-weight: 900;
          cursor: pointer;
          box-shadow: 0 18px 35px rgba(15, 23, 42, 0.24);
          transition: transform 0.12s ease, opacity 0.12s ease;
        }

        button:hover:not(:disabled) {
          transform: translateY(-1px);
        }

        button:active:not(:disabled) {
          transform: translateY(0);
        }

        button:disabled {
          opacity: 0.65;
          cursor: not-allowed;
        }

        .message {
          display: none;
          margin-top: 14px;
          padding: 12px 14px;
          border-radius: 16px;
          font-size: 14px;
          line-height: 1.45;
          text-align: center;
        }

        .message.error {
          display: block;
          background: var(--error-bg);
          color: var(--error-text);
          border: 1px solid var(--error-border);
        }

        .message.success {
          display: block;
          background: var(--success-bg);
          color: var(--success-text);
          border: 1px solid var(--success-border);
        }

        .footer {
          margin-top: 16px;
          color: var(--muted);
          text-align: center;
          font-size: 13px;
          line-height: 1.5;
        }

        .back-note {
          margin-top: 12px;
          color: var(--muted);
          text-align: center;
          font-size: 13px;
          line-height: 1.5;
        }

        html[dir="ltr"] body {
          direction: ltr;
        }

        @media (max-width: 420px) {
          body {
            padding: 16px;
          }

          .card {
            padding: 22px;
            border-radius: 24px;
          }

          .brand h1 {
            font-size: 24px;
          }

          .brand-badge {
            width: 72px;
            height: 72px;
            border-radius: 22px;
          }
        }
    </style>
</head>

<body>
<main class="page">
    <section class="brand">
        <div class="brand-badge">KMI</div>
        <h1 id="brandTitle">K.M.I – קרב מגן ישראלי</h1>
        <p id="brandSubtitle">איפוס סיסמה לחשבון שלך</p>
    </section>

    <section class="card">
        <h2 id="title">איפוס סיסמה</h2>

        <p class="subtitle" id="subtitle">
            הזן סיסמה חדשה. לאחר האיפוס תוכל לחזור לאפליקציה ולהתחבר מחדש.
        </p>

        <form id="resetForm">
            <label for="password" id="passwordLabel">סיסמה חדשה</label>
            <input
                    id="password"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    required
            />

            <label for="confirmPassword" id="confirmLabel">אימות סיסמה</label>
            <input
                    id="confirmPassword"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    required
            />

            <button id="submitButton" type="submit">איפוס סיסמה</button>

            <div id="message" class="message"></div>
        </form>
    </section>

    <div class="footer" id="footer">
        אם לא ביקשת לאפס סיסמה, אפשר לסגור את הדף.
    </div>

    <div class="back-note" id="backNote">
        לאחר איפוס הסיסמה, חזור לאפליקציית K.M.I והתחבר עם הסיסמה החדשה.
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      verifyPasswordResetCode,
      confirmPasswordReset
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    /*
      חשוב:
      את הערכים האלה צריך להעתיק מתוך Firebase Console:

      Firebase Console
      → Project settings
      → General
      → Your apps
      → Web app
      → Firebase SDK config

      אם עדיין אין Web app בפרויקט Firebase:
      לוחצים על האייקון </> ומוסיפים Web app.
    */
  const firebaseConfig = {
   apiKey: "AIzaSyBnIMQwX53mEgRYXbiZLLoczrhPpyQ5c2E",
    authDomain: "app-1c22cc8d.firebaseapp.com",
    projectId: "app-1c22cc8d",
    storageBucket: "app-1c22cc8d.firebasestorage.app",
    messagingSenderId: "1088383217233",
    appId: "1:1088383217233:web:7a9bd94403a543667a5270"
  };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function collectResetParams() {
      const collected = new URLSearchParams();

      function mergeParams(searchLike) {
        if (!searchLike) return;

        const clean = searchLike.startsWith("?") || searchLike.startsWith("#")
          ? searchLike.substring(1)
          : searchLike;

        const partParams = new URLSearchParams(clean);
        partParams.forEach((value, key) => {
          if (!collected.has(key)) {
            collected.set(key, value);
          }
        });
      }

      // 1. פרמטרים רגילים אחרי ?
      mergeParams(window.location.search);

      // 2. פרמטרים אחרי #
      mergeParams(window.location.hash);

      // 3. אם Firebase שם את הקישור האמיתי בתוך continueUrl / continue / link
      const nestedUrl =
        collected.get("continueUrl") ||
        collected.get("continue") ||
        collected.get("link");

      if (nestedUrl) {
        try {
          const decoded = decodeURIComponent(nestedUrl);
          const nested = new URL(decoded);

          mergeParams(nested.search);
          mergeParams(nested.hash);
        } catch (e) {
          console.warn("Could not parse nested Firebase reset URL", e);
        }
      }

      return collected;
    }

    const params = collectResetParams();

    const mode = params.get("mode");
    const oobCode = params.get("oobCode");
    const lang = params.get("lang") || "he";

    const isEnglish = lang.toLowerCase().startsWith("en");

console.log("KMI_RESET_DEBUG fullUrl =", window.location.href);
console.log("KMI_RESET_DEBUG mode =", mode);
console.log("KMI_RESET_DEBUG hasOobCode =", !!oobCode);
console.log("KMI_RESET_DEBUG oobCodeStart =", oobCode ? oobCode.substring(0, 8) : "missing");
console.log("KMI_RESET_DEBUG apiKey =", params.get("apiKey"));

    const translations = {
      he: {
        brandTitle: "K.M.I – קרב מגן ישראלי",
        brandSubtitle: "איפוס סיסמה לחשבון שלך",
        title: "איפוס סיסמה",
        subtitle: "הזן סיסמה חדשה. לאחר האיפוס תוכל לחזור לאפליקציה ולהתחבר מחדש.",
        passwordLabel: "סיסמה חדשה",
        confirmLabel: "אימות סיסמה",
        button: "איפוס סיסמה",
        sending: "מאפס סיסמה...",
        missingCode: "קישור האיפוס אינו תקין או שחסרים בו פרטים.",
        invalidMode: "הקישור הזה לא מיועד לאיפוס סיסמה.",
        invalidCode: "קישור האיפוס אינו תקף או שפג תוקפו. נסה לשלוח מייל שחזור חדש מהאפליקציה.",
        weakPassword: "הסיסמה חייבת להכיל לפחות 6 תווים.",
        mismatch: "הסיסמאות אינן זהות.",
        success: "הסיסמה אופסה בהצלחה. עכשיו אפשר לחזור לאפליקציה ולהתחבר עם הסיסמה החדשה.",
        failed: "לא הצלחנו לאפס את הסיסמה. נסה שוב או שלח מייל שחזור חדש מהאפליקציה.",
        footer: "אם לא ביקשת לאפס סיסמה, אפשר לסגור את הדף.",
        backNote: "לאחר איפוס הסיסמה, חזור לאפליקציית K.M.I והתחבר עם הסיסמה החדשה."
      },
      en: {
        brandTitle: "K.M.I – Israeli Krav Magen",
        brandSubtitle: "Password reset for your account",
        title: "Reset password",
        subtitle: "Enter a new password. After the reset, you can return to the app and sign in again.",
        passwordLabel: "New password",
        confirmLabel: "Confirm password",
        button: "Reset password",
        sending: "Resetting password...",
        missingCode: "This reset link is invalid or missing required details.",
        invalidMode: "This link is not intended for password reset.",
        invalidCode: "This reset link is invalid or expired. Please request a new reset email from the app.",
        weakPassword: "Password must contain at least 6 characters.",
        mismatch: "Passwords do not match.",
        success: "Your password was reset successfully. You can now return to the app and sign in with your new password.",
        failed: "We could not reset your password. Please try again or request a new reset email from the app.",
        footer: "If you did not request a password reset, you can close this page.",
        backNote: "After resetting your password, return to the K.M.I app and sign in with your new password."
      }
    };

    const copy = isEnglish ? translations.en : translations.he;

    document.documentElement.lang = isEnglish ? "en" : "he";
    document.documentElement.dir = isEnglish ? "ltr" : "rtl";

    const brandTitle = document.getElementById("brandTitle");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const passwordLabel = document.getElementById("passwordLabel");
    const confirmLabel = document.getElementById("confirmLabel");
    const submitButton = document.getElementById("submitButton");
    const footer = document.getElementById("footer");
    const backNote = document.getElementById("backNote");

    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const message = document.getElementById("message");

    brandTitle.textContent = copy.brandTitle;
    brandSubtitle.textContent = copy.brandSubtitle;
    title.textContent = copy.title;
    subtitle.textContent = copy.subtitle;
    passwordLabel.textContent = copy.passwordLabel;
    confirmLabel.textContent = copy.confirmLabel;
    submitButton.textContent = copy.button;
    footer.textContent = copy.footer;
    backNote.textContent = copy.backNote;

    function showMessage(type, text) {
      message.className = `message ${type}`;
      message.textContent = text;
    }

    function clearMessage() {
      message.className = "message";
      message.textContent = "";
    }

    function disableForm() {
      passwordInput.disabled = true;
      confirmInput.disabled = true;
      submitButton.disabled = true;
    }

    function enableSubmit() {
      submitButton.disabled = false;
      submitButton.textContent = copy.button;
    }

    if (mode !== "resetPassword") {
      showMessage("error", copy.invalidMode);
      disableForm();
    } else if (!oobCode) {
      showMessage("error", copy.missingCode);
      disableForm();
    } else {
      verifyPasswordResetCode(auth, oobCode)
        .then(() => {
          clearMessage();
          passwordInput.disabled = false;
          confirmInput.disabled = false;
          submitButton.disabled = false;
        })
        .catch((error) => {
          console.error("verifyPasswordResetCode failed:", error);
          showMessage("error", copy.invalidCode);
          disableForm();
        });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      clearMessage();

      const password = passwordInput.value.trim();
      const confirmPassword = confirmInput.value.trim();

      if (password.length < 6) {
        showMessage("error", copy.weakPassword);
        return;
      }

      if (password !== confirmPassword) {
        showMessage("error", copy.mismatch);
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = copy.sending;

      try {
        await confirmPasswordReset(auth, oobCode, password);

        showMessage("success", copy.success);

        passwordInput.value = "";
        confirmInput.value = "";

        disableForm();
      } catch (error) {
        showMessage("error", copy.failed);
        enableSubmit();
      }
    });
</script>
</body>
</html>
